<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Predictions</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --border:    #242424;
      --accent:    #00e676;
      --accent-dim:#00e67622;
      --text:      #f0f0f0;
      --muted:     #666;
      --danger:    #ff4d4d;
      --radius:    14px;
    }

    html { background: var(--bg); }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge-pl {
      background: #38003c;
      border: 1px solid #6d1a75;
      color: #e8b4f8;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .user-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }

    .round-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-left: 2px;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    .match-card:hover { border-color: #333; }
    .match-card.filled { border-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-card:nth-child(1)  { animation-delay: 0.03s; }
    .match-card:nth-child(2)  { animation-delay: 0.07s; }
    .match-card:nth-child(3)  { animation-delay: 0.11s; }
    .match-card:nth-child(4)  { animation-delay: 0.15s; }
    .match-card:nth-child(5)  { animation-delay: 0.19s; }
    .match-card:nth-child(6)  { animation-delay: 0.23s; }
    .match-card:nth-child(7)  { animation-delay: 0.27s; }
    .match-card:nth-child(8)  { animation-delay: 0.31s; }
    .match-card:nth-child(9)  { animation-delay: 0.35s; }
    .match-card:nth-child(10) { animation-delay: 0.39s; }

    .match-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .team-with-crest {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-with-crest.home {
      justify-content: flex-start;
    }

    .team-with-crest.away {
      justify-content: flex-end;
      flex-direction: row-reverse;
    }

    .team-crest {
      width: 28px;
      height: 28px;
      object-fit: contain;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .team {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }

    .team.home { text-align: left; }
    .team.away { text-align: right; }

    .vs-divider {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 4px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr 32px 1fr;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
    }

    .score-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 10px 4px;
      width: 100%;
      outline: none;
      -moz-appearance: textfield;
      transition: border-color 0.15s, background 0.15s;
    }

    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .score-input:focus {
      border-color: var(--accent);
      background: #0d1f14;
    }

    .score-input::placeholder { color: #333; }

    .score-sep {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--border);
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      gap: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-text {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 50;
    }

    .footer-inner {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .progress-count {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
    }

    .progress-bar-bg {
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .submit-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .submit-btn:active:not(:disabled) { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .submit-btn .btn-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .submit-btn.loading .btn-spinner { display: block; }
    .submit-btn.loading .btn-text { display: none; }

    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }

    .invalid-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      gap: 12px;
    }

    .invalid-screen h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--danger);
      letter-spacing: 0.04em;
    }

    .invalid-screen p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    .confirmed-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      gap: 14px;
      animation: fadeUp 0.4s ease;
    }

    .confirmed-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .confirmed-icon.locked {
      background: rgba(255,77,77,0.1);
      border-color: var(--danger);
    }

    .confirmed-screen h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .confirmed-screen h2.locked { color: var(--danger); }

    .confirmed-screen p {
      font-size: 14px;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
    }

    @media (max-width: 380px) {
      .team { font-size: 12px; }
      .score-input { font-size: 24px; }
      .header-title { font-size: 18px; }
    }
  </style>
</head>

<body>

  <div class="toast" id="toast"></div>

  <div class="header">
    <div class="header-left">
      <div class="badge-pl">Premier League</div>
      <span class="header-title">Predictions</span>
    </div>
    <div class="user-pill" id="userPill">—</div>
  </div>

  <div class="page" id="mainPage">
    <div class="round-label" id="roundLabel"></div>
    <div id="matches"></div>
  </div>

  <div class="footer-bar" id="footerBar" style="display:none">
    <div class="footer-inner">
      <div class="progress-row">
        <span class="progress-label">Predictions filled</span>
        <span class="progress-count" id="progressCount">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitAll()">
        <div class="btn-spinner"></div>
        <span class="btn-text">Lock In Predictions →</span>
      </button>
    </div>
  </div>

<script>
  const API_URL     = "https://epl.sid84kamath.workers.dev/competitions/PL/matches";
  const BACKEND_URL = "https://epl.sid84kamath.workers.dev/submit";

  const params    = new URLSearchParams(window.location.search);
  const userEmail = params.get("email");

  // Safe JSON parse — never throws even if response is HTML
  async function safeJSON(res) {
    try { return await res.json(); }
    catch(e) { return {}; }
  }

  // Invalid link guard
  if (!userEmail) {
    document.querySelector('.header').style.display = 'none';
    document.getElementById('footerBar').style.display = 'none';
    document.getElementById('mainPage').innerHTML = `
      <div class="invalid-screen">
        <div style="font-size:40px">🔒</div>
        <h2>Invalid Link</h2>
        <p>Please use the personal link sent to your email to access predictions.</p>
      </div>`;
  } else {
    document.getElementById('userPill').textContent = userEmail;
    init();
  }

  // Init: check if already submitted, then load matches
  async function init() {
    document.getElementById('matches').innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <span class="spinner-text">Loading...</span>
      </div>`;

    try {
      const checkRes    = await fetch(`${BACKEND_URL}?email=${encodeURIComponent(userEmail)}&check=1`);
      const checkResult = await safeJSON(checkRes);
      if (checkResult.status === 'duplicate') {
        showAlreadySubmitted();
        return;
      }
    } catch(e) {
      // Check failed — let them through
    }

    loadMatches();
  }

  async function loadMatches() {
    const matchesDiv = document.getElementById('matches');
    const roundLabel = document.getElementById('roundLabel');

    matchesDiv.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <span class="spinner-text">Fetching fixtures...</span>
      </div>`;

    try {
      const res  = await fetch(API_URL);
      const data = await safeJSON(res);

      if (!data || !Array.isArray(data.matches)) throw new Error('Bad API response');

      const now      = new Date();
      const upcoming = data.matches
        .filter(m => new Date(m.utcDate) > now)
        .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

      if (upcoming.length === 0) {
        matchesDiv.innerHTML = `
          <div class="empty-state">
            <div class="icon">📅</div>
            <p>No upcoming matches right now.<br>Check back closer to the next gameweek.</p>
          </div>`;
        return;
      }

      const firstDate = new Date(upcoming[0].utcDate);
      const gameweek  = upcoming.filter(m => {
        const diff = (new Date(m.utcDate) - firstDate) / (1000 * 60 * 60 * 24);
        return diff >= 0 && diff <= 4;
      });

      roundLabel.textContent = `Gameweek ${gameweek[0].matchday} · ${gameweek.length} matches`;
      matchesDiv.innerHTML = '';

      gameweek.forEach(m => {
        const id   = String(m.id);
        const date = new Date(m.utcDate);
        const when = date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })
                   + ' · '
                   + date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/London' })
                   + ' BST';

        const card = document.createElement('div');
        card.className       = 'match-card';
        card.dataset.match_id = id;

        card.innerHTML = `
          <div class="match-meta">${when}</div>
          <div class="match-teams">
            <div class="team-with-crest home">
              <img src="${m.homeTeam.crest}" alt="${m.homeTeam.name}" class="team-crest" onerror="this.style.display='none'">
              <span class="team home">${m.homeTeam.shortName || m.homeTeam.name}</span>
            </div>
            <span class="vs-divider">vs</span>
            <div class="team-with-crest away">
              <img src="${m.awayTeam.crest}" alt="${m.awayTeam.name}" class="team-crest" onerror="this.style.display='none'">
              <span class="team away">${m.awayTeam.shortName || m.awayTeam.name}</span>
            </div>
          </div>
          <div class="score-row">
            <input class="score-input" type="number" min="0" max="20" placeholder="–"
              id="home-${id}" oninput="onScoreInput()" inputmode="numeric">
            <div class="score-sep">:</div>
            <input class="score-input" type="number" min="0" max="20" placeholder="–"
              id="away-${id}" oninput="onScoreInput()" inputmode="numeric">
          </div>`;

        matchesDiv.appendChild(card);
      });

      window.currentMatches = gameweek;
      document.getElementById('footerBar').style.display = 'block';
      updateProgress();

    } catch (err) {
      console.error(err);
      matchesDiv.innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>Failed to load fixtures.<br>Please try again in a moment.</p>
        </div>`;
    }
  }

  function onScoreInput() {
    updateProgress();
    (window.currentMatches || []).forEach(m => {
      const id   = String(m.id);
      const card = document.querySelector(`[data-match-id="${id}"]`);
      const h    = document.getElementById(`home-${id}`).value;
      const a    = document.getElementById(`away-${id}`).value;
      if (card) card.classList.toggle('filled', h !== '' && a !== '');
    });
  }

  function updateProgress() {
    const matches = window.currentMatches || [];
    const total   = matches.length;
    let   filled  = 0;
    matches.forEach(m => {
      const id = String(m.id);
      const h  = document.getElementById(`home-${id}`)?.value;
      const a  = document.getElementById(`away-${id}`)?.value;
      if (h !== '' && a !== '') filled++;
    });
    document.getElementById('progressCount').textContent = `${filled} / ${total}`;
    document.getElementById('progressFill').style.width  = total ? `${(filled/total)*100}%` : '0%';
  }

  async function submitAll() {
    const btn     = document.getElementById('submitBtn');
    const matches = window.currentMatches || [];

    const predictions = matches.map(m => {
      const id = String(m.id);
      return {
        match_id:  id,
        home_pred: parseInt(document.getElementById(`home-${id}`)?.value),
        away_pred: parseInt(document.getElementById(`away-${id}`)?.value)
      };
    }).filter(p => !isNaN(p.home_pred) && !isNaN(p.away_pred));

    if (predictions.length === 0) {
      showToast('Enter at least one prediction', 'error');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      for (const p of predictions) {
        const res    = await fetch(BACKEND_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: userEmail, ...p })
        });
        const result = await safeJSON(res);
        if (result.status === 'duplicate') {
          showAlreadySubmitted();
          return;
        }
      }

      document.getElementById('footerBar').style.display = 'none';
      document.getElementById('mainPage').innerHTML = `
        <div class="confirmed-screen">
          <div class="confirmed-icon">✓</div>
          <h2>You're Locked In</h2>
          <p>Your ${predictions.length} prediction${predictions.length !== 1 ? 's' : ''} have been saved. Results will land in your inbox after the gameweek.</p>
        </div>`;

    } catch (err) {
      console.error(err);
      showToast('Submission failed — try again', 'error');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showAlreadySubmitted() {
    document.getElementById('footerBar').style.display = 'none';
    document.getElementById('mainPage').innerHTML = `
      <div class="confirmed-screen">
        <div class="confirmed-icon locked">🔒</div>
        <h2 class="locked">Already Submitted</h2>
        <p>You've already locked in your predictions for this gameweek. Good luck — results will be emailed after all matches are played.</p>
      </div>`;
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
