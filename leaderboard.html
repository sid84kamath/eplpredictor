<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Predictions Leaderboard</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --border:    #242424;
      --accent:    #00e676;
      --accent-dim:#00e67622;
      --text:      #f0f0f0;
      --muted:     #666;
      --gold:      #ffd700;
      --silver:    #c0c0c0;
      --bronze:    #cd7f32;
      --radius:    14px;
    }

    html { background: var(--bg); }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .leaderboard-header {
      display: grid;
      grid-template-columns: 60px 1fr 80px;
      gap: 12px;
      padding: 16px;
      background: #1a1a1a;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 60px 1fr 80px;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      animation: slideIn 0.3s ease both;
    }

    .leaderboard-row:last-child { border-bottom: none; }
    .leaderboard-row:hover { background: #0d0d0d; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .leaderboard-row:nth-child(1) { animation-delay: 0; }
    .leaderboard-row:nth-child(2) { animation-delay: 0.05s; }
    .leaderboard-row:nth-child(3) { animation-delay: 0.10s; }
    .leaderboard-row:nth-child(4) { animation-delay: 0.15s; }
    .leaderboard-row:nth-child(5) { animation-delay: 0.20s; }
    .leaderboard-row:nth-child(n+6) { animation-delay: 0.25s; }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      line-height: 1;
    }

    .rank.gold { color: var(--gold); }
    .rank.silver { color: var(--silver); }
    .rank.bronze { color: var(--bronze); }

    .rank-medal {
      font-size: 20px;
      margin-right: 4px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-email {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    .user-email-short {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }

    .points {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      font-weight: 800;
      text-align: right;
      color: var(--accent);
      line-height: 1;
    }

    .points-label {
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 36px; margin-bottom: 12px; }

    .refresh-info {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .refresh-time {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">⚽ Leaderboard</div>
    <div class="header-subtitle">Premier League Predictions</div>
  </div>

  <div class="page">
    <div id="leaderboardContainer"></div>
    <div id="refreshInfo" class="refresh-info"></div>
  </div>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/d/YOUR_DEPLOYMENT_ID/userweb';  // Update with your Web App URL

    async function loadLeaderboard() {
      const container = document.getElementById('leaderboardContainer');
      
      try {
        container.innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading leaderboard...</p>
          </div>`;

        // Fetch from your Google Apps Script Web App
        // This assumes you've deployed Leaderboard.gs as a web endpoint
        const response = await fetch(`${WEBAPP_URL}?action=leaderboard`);
        const data = await response.json();

        if (!data.leaderboard || data.leaderboard.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📊</div>
              <p>No scores yet.<br>Predictions will appear here as matches finish.</p>
            </div>`;
          return;
        }

        // Build leaderboard UI
        const html = `
          <div class="leaderboard">
            <div class="leaderboard-header">
              <div>Rank</div>
              <div>Player</div>
              <div>Points</div>
            </div>
            ${data.leaderboard.map((row, idx) => {
              const rank = idx + 1;
              let medal = '';
              let rankClass = '';
              
              if (rank === 1) { medal = '🥇'; rankClass = 'gold'; }
              else if (rank === 2) { medal = '🥈'; rankClass = 'silver'; }
              else if (rank === 3) { medal = '🥉'; rankClass = 'bronze'; }

              const email = row[0] || 'Unknown';
              const points = row[1] || 0;
              const emailDisplay = email.length > 20 ? email.substring(0, 20) + '...' : email;

              return `
                <div class="leaderboard-row">
                  <div class="rank ${rankClass}">${rank}${medal ? ' ' + medal : ''}</div>
                  <div class="user-info">
                    <div class="user-email">${emailDisplay}</div>
                  </div>
                  <div>
                    <div class="points">${points}</div>
                    <div class="points-label">pts</div>
                  </div>
                </div>`;
            }).join('')}
          </div>`;

        container.innerHTML = html;
        document.getElementById('refreshInfo').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        console.error('Error loading leaderboard:', err);
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <p>Failed to load leaderboard.<br>Please try again in a moment.</p>
          </div>`;
      }
    }

    // Load on page load
    loadLeaderboard();

    // Refresh every 30 seconds
    setInterval(loadLeaderboard, 30000);
  </script>

</body>
</html>
